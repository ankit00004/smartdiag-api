apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartdiag-api
  labels:
    app: smartdiag-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartdiag-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deployment
  template:
    metadata:
      labels:
        app: smartdiag-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: smartdiag-api
          image: ghcr.io/ankit00004/smartdiag-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: /app/model.pkl
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
